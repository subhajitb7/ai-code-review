<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Main Circular Shell -->
  <circle cx="50" cy="50" r="48" fill="url(#g)" />
  
  <!-- Stylized Monogram 'S' -->
  <path d="M70 32 C70 22, 30 22, 30 32 L30 42 C30 52, 70 52, 70 62 L70 72 C70 82, 30 82, 30 72" 
        stroke="white" stroke-width="12" fill="none" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Precision Nodes -->
  <circle cx="30" cy="32" r="4.5" fill="white" />
  <circle cx="70" cy="72" r="4.5" fill="white" />
</svg>
